# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

managedNodeGroups:
- name: spot
  instanceTypes: [ "t3a.large","t3.large","m5a.large", "m5.large","m6a.large", "m6i.large", "c5.large","c5a.large" ]
  spot: true
  desiredCapacity: 2

